name: pipe
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipe:
    uses: openmfp/gha/.github/workflows/pipeline-node-app.yml@4f9c01c57766d5b99bd97d07e55c7c6526dc6bb3 # main
    secrets: inherit
    with:
      imageTagName: ghcr.io/openmfp/portal
      componentVersionKey: portal
      repoVersionUpdate: openmfp/helm-charts
